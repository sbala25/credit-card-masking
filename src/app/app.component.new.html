<main class="card-demo">
  <section class="panel">
    <p class="eyebrow">Secure card entry</p>
    <h1>Reusable credit card input</h1>
    <p class="description">Use the input component wherever you need card entry with masking and validation.</p>

    <app-custom-mask-input
      [control]="cardControl"
      label="Card number"
      placeholder="Enter card number"
    ></app-custom-mask-input>

    <app-custom-mask-input
      [control]="anotherCardControl"
      label="Secondary card"
      placeholder="Enter secondary card"
    ></app-custom-mask-input>

    <button type="button" class="submit-card" (click)="submitCard()">Submit card</button>

    <p class="status" *ngIf="submittedCardNumber">
      Submitted card number: {{ submittedCardNumber }}
    </p>
    <p class="status" *ngIf="submittedCardNumber2">
      Submitted secondary card number: {{ submittedCardNumber2 }}
    </p>
  </section>
</main>
