<main class="card-demo">
  <section class="panel">
    <p class="eyebrow">Secure card entry</p>
    <h1>Mask your card number while typing.</h1>
    <p class="description">Type normally, keep the last digit visible for 200ms, and toggle full visibility with the eye icon.</p>

    <label for="card-number">Card number</label>
    <div class="input-row input-shell">
      <div style="flex: 1; position: relative;">
        <input
          id="card-number"
          type="text"
          inputmode="numeric"
          autocomplete="cc-number"
          [formControl]="cardControl"
          (input)="onInput($event)"
          appOnlyNumber
          placeholder="Enter card number"
        />
        <input
          class="mask-overlay"
          type="text"
          [value]="showFullNumber ? cardNumber : displayValue"
          readonly
          aria-hidden="true"
        />
      </div>
      <button
        type="button"
        class="toggle-visibility"
        (click)="toggleVisibility()"
        [attr.aria-pressed]="showFullNumber"
        aria-label="Toggle card number visibility"
      >
        <svg *ngIf="!showFullNumber" viewBox="0 0 24 24" aria-hidden="true" class="eye-icon">
          <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="1.8"/>
        </svg>
        <svg *ngIf="showFullNumber" viewBox="0 0 24 24" aria-hidden="true" class="eye-icon">
          <path d="M3 3l18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M10.6 10.6A4 4 0 0 0 12 16a4 4 0 0 0 4-4c0-.7-.2-1.4-.5-2" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M9.2 5.3C10.2 5.1 11.1 5 12 5c5 0 9 4 10 7a14.7 14.7 0 0 1-3.8 4.3" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <p class="error-text" *ngIf="cardControl.invalid && (cardControl.touched || cardControl.dirty)">
      Please enter a valid card number.
    </p>

    <button type="button" class="submit-card" (click)="submitCard()">Submit card</button>

    <p class="status" *ngIf="submittedCardNumber">
      Submitted card number: {{ submittedCardNumber }}
    </p>
  </section>
</main>
