<main class="card-demo">
  <section class="panel">
    <p class="eyebrow">Secure card entry</p>
    <h1>Mask your card number while typing.</h1>
    <p class="description">Type normally, keep the last digit visible for 200ms, and toggle full visibility with the eye icon.</p>

    <label for="card-number">Card number</label>
    <div class="input-row">
      <input
        id="card-number"
        type="text"
        inputmode="numeric"
        autocomplete="cc-number"
        [value]="displayValue"
        (input)="onInput($event)"
        placeholder="Enter card number"
      />
      <button
        type="button"
        class="toggle-visibility"
        (click)="toggleVisibility()"
        [attr.aria-pressed]="showFullNumber"
        aria-label="Toggle card number visibility"
      >
        {{ showFullNumber ? '??' : '???' }}
      </button>
    </div>

    <button type="button" class="submit-card" (click)="submitCard()">Submit card</button>

    <p class="status" *ngIf="submittedCardNumber">
      Submitted card number: {{ submittedCardNumber }}
    </p>
  </section>
</main>
